name: starter-agent-template smoke
on:
  push:
    paths:
      - 'starter-agent-template/**'
      - '.github/workflows/template-smoke.yml'
  pull_request:
    paths:
      - 'starter-agent-template/**'
      - '.github/workflows/template-smoke.yml'
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Run starter-agent-template smoke test
        working-directory: starter-agent-template
        run: pnpm dlx tsx scripts/smoke.ts
