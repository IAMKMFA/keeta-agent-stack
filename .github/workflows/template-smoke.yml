name: starter-agent-template smoke
on:
  push:
    paths:
      - 'starter-agent-template/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/template-smoke.yml'
  pull_request:
    paths:
      - 'starter-agent-template/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
      - '.github/workflows/template-smoke.yml'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.15.4
      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: pnpm
      - name: Install monorepo dependencies
        run: pnpm install --frozen-lockfile
      - name: Run starter-agent-template smoke test
        working-directory: starter-agent-template
        run: pnpm smoke
