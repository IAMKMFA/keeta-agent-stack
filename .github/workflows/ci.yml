name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  quality:
    name: Lint, Typecheck, Unit Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Build docs bundle
        run: pnpm --filter @keeta-agent-stack/docs build

      - name: Verify publishable packages (publint)
        run: pnpm publint:all

      - name: Verify MCP TOOLS.md is up to date
        run: |
          pnpm --filter @keeta-agent-stack/mcp docs:tools
          if ! git diff --exit-code -- apps/mcp/TOOLS.md; then
            echo "::error::apps/mcp/TOOLS.md is stale. Run 'pnpm --filter @keeta-agent-stack/mcp docs:tools' and commit."
            exit 1
          fi

  security-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: pnpm audit (high+ severity)
        run: pnpm audit --prod --audit-level high

      - name: OSV Scanner (advisory)
        continue-on-error: true
        uses: google/osv-scanner-action/osv-scanner-action@v1.9.1
        with:
          scan-args: |-
            --recursive
            --skip-git
            ./

      - name: Drizzle migration drift check
        run: |
          # Fails if pending migrations haven't been committed alongside schema changes.
          # drizzle-kit generate is idempotent; if the working tree is dirty afterwards we
          # know the schema diverged from the committed migrations.
          pnpm --filter @keeta-agent-stack/storage run db:generate
          if ! git diff --exit-code -- infrastructure/migrations packages/storage/drizzle; then
            echo "::error::Schema changed but migration is missing. Run 'pnpm --filter @keeta-agent-stack/storage run db:generate' and commit the SQL."
            exit 1
          fi

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: keeta
          POSTGRES_PASSWORD: keeta
          POSTGRES_DB: keeta_agent
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U keeta -d keeta_agent"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Wait for Postgres and Redis
        run: |
          until pg_isready -h localhost -p 5432 -U keeta -d keeta_agent; do sleep 1; done
          until node <<'NODE'
          const net = require('node:net');
          const socket = net.createConnection({ host: '127.0.0.1', port: 6379 });
          socket.setTimeout(1000);
          socket.on('connect', () => socket.write('*1\r\n$4\r\nPING\r\n'));
          socket.on('data', (chunk) => {
            const ok = chunk.toString().includes('PONG');
            socket.end();
            process.exit(ok ? 0 : 1);
          });
          socket.on('timeout', () => {
            socket.destroy();
            process.exit(1);
          });
          socket.on('error', () => process.exit(1));
          NODE
          do
            sleep 1
          done

      - name: Run integration tests
        env:
          RUN_INTEGRATION_TESTS: "true"
          INTEGRATION_DATABASE_URL: postgresql://keeta:keeta@localhost:5432/keeta_agent
          INTEGRATION_REDIS_URL: redis://localhost:6379/15
          OPS_API_KEY: integration-ops-key
        run: pnpm test:integration
