services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: keeta
      POSTGRES_PASSWORD: keeta
      POSTGRES_DB: keeta_agent
    ports:
      - '5432:5432'
    volumes:
      - keeta_pg:/var/lib/postgresql/data
      - ./infrastructure/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U keeta -d keeta_agent']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  keeta_pg:
